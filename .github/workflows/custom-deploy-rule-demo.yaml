name: 🚀 Custom Deployment Protection Rules Demo

on:
  workflow_dispatch:
    push:
        branches: [main]

permissions:
    contents: read
    security-events: read

jobs:
    security_overview:
        name: 🔎 Security Overview
        runs-on: ubuntu-latest
        outputs:
            open_high_total: ${{ steps.summarize.outputs.open_high_total }}
            open_high_main: ${{ steps.summarize.outputs.open_high_main }}
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v6
            - name: 📊 Generate GitHub Summary
              id: summarize
              uses: ./.github/actions/security-overview-summary
              with:
                github-token: ${{ github.token }}
                owner: ${{ github.repository_owner }}
                repo: ${{ github.event.repository.name }}
                api-version: 2026-03-10
                security-dashboard-url: https://github.com/${{ github.repository }}/security/code-scanning

    test_gate_in_dev:
        name: 🧪 Test Gate in Dev
        runs-on: ubuntu-latest
        needs: [security_overview]
        environment: 
            name: dev
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v6
            - name: ✅ Approved
              run: |
                echo Gate passed! 👍🏻
    test_gate_in_prod:
        name: 🏭 Test Gate in Prod
        runs-on: ubuntu-latest
        needs: [security_overview, test_gate_in_dev]
        environment: 
            name: prod
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v6
            - name: ✅ Approved
              run: |
                echo Gate passed! 👍🏻            
        